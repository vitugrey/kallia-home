<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kallia Home - Smart Mirror</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap');

        /* O Espelho deve ter fundo PRETO PURO para a tela não brilhar e texto BRANCO */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden; /* Remove scrollbars globais do navegador/espelho */
            cursor: none; /* Oculta o mouse para dar ilusão de painel embutido */
        }

        /* Layout Grid para organizar os cantos do espelho */
        .mirror-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto 1fr auto;
            /* Dimensões do Display de 7 polegadas IPS do Raspberry Pi (1024x600) */
            width: 1024px;
            height: 600px;
            /* Centraliza a tela para visualização no PC */
            margin: 0 auto;
            padding: 25px; /* Reduzido de 40 para 25 para dar mais espaço de respiro vertical */
            box-sizing: border-box;
            position: relative;
        }

        .top-left { grid-column: 1; grid-row: 1; text-align: left; }
        .top-center { grid-column: 2; grid-row: 1; text-align: center; }
        .top-right { grid-column: 3; grid-row: 1; text-align: right; }
        
        .middle-center { 
            grid-column: 1 / 4; 
            grid-row: 2; 
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
        }

        .bottom-left { grid-column: 1; grid-row: 3; text-align: left; align-self: end; padding-bottom: 10px; position: relative; }
        .bottom-center { grid-column: 1 / 4; grid-row: 3; text-align: center; align-self: end; }

        /* Estilos dos Widgets */
        .time-widget {
            font-size: 5rem;
            font-weight: 600;
            line-height: 1;
            margin-bottom: 5px;
        }
        
        .date-widget {
            font-size: 1.5rem;
            font-weight: 200;
            color: #bbbbbb;
        }
        
        .weather-widget {
            margin-top: 15px; /* Reduzido */
            font-size: 3rem; /* Reduzido levemente para caber melhor */
            font-weight: 200;
            line-height: 1;
        }

        .weather-desc {
            font-size: 1.2rem;
            color: #888888;
            margin-top: 5px;
        }

        .news-widget {
            margin-top: 20px; /* Reduzido */
            font-size: 1.05rem; /* Reduzido de 1.2rem para diminuir quebras de linha */
            color: #999999;
            font-weight: 200;
            line-height: 1.4;
            max-width: 480px; /* Aumentado de 400px para usar mais a horizontal do que a vertical */
            float: right; /* Mantém colado na borda direita */
        }

        .news-item {
            margin-bottom: 10px; /* Reduzido de 15px */
            text-align: justify; /* Justificado a pedido do usuário */
            text-align-last: right; /* A última linha gruda na direita */
            border-right: 2px solid rgba(255, 255, 255, 0.2);
            padding-right: 15px;
            cursor: pointer; /* Indica que é clicável no PC, no espelho será touch */
            transition: color 0.3s;
        }
        
        .news-item:hover { color: #ffffff; }

        /* Container que exibe a notícia completa */
        .news-detail-widget {
            margin-top: 20px;
            width: 100%;
            display: none; /* Escondido por padrão */
        }
        
        .news-detail-content {
            font-size: 1.1rem;
            color: #eeeeee;
            text-align: justify;
            max-height: 250px; /* Limita a altura para habilitar o scroll */
            overflow-y: auto;  /* Ativa a barra de rolagem */
            padding-right: 15px;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        /* Personalizando o Scrollbar pra ficar bonitão no espelho */
        .news-detail-content::-webkit-scrollbar { width: 6px; }
        .news-detail-content::-webkit-scrollbar-track { background: transparent; }
        .news-detail-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
        .news-detail-content::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        .back-btn {
            font-size: 1rem;
            color: #888888;
            cursor: pointer;
            text-align: right;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 10px;
            transition: color 0.3s;
        }
        .back-btn:hover { color: #ffffff; }
        
        .status-badge {
            font-size: 0.9rem;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
            color: #aaaaaa;
            display: inline-block;
        }
        .btn-discreet {
            background-color: transparent;
            color: #888888;
            border: 1px solid #444444;
            padding: 5px 10px;
            font-size: 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: color 0.3s, border-color 0.3s;
            font-family: inherit;
        }
        .btn-discreet:hover { color: #ffffff; border-color: #ffffff; }
        
        .btn-option {
            background-color: rgba(255,255,255,0.1);
            color: #ffffff;
            border: none;
            padding: 10px 15px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            transition: background-color 0.2s;
            font-family: inherit;
        }
        .btn-option:hover { background-color: rgba(255,255,255,0.3); }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .mic-pulse {
            animation: pulse 1.5s infinite;
        }
        
    </style>
</head>
<body>
    
    <!-- PAINEL DE DEBUG PARA O NOTEBOOK (Invisível no espelho real) -->
    <div style="position: absolute; top: 5px; left: 5px; background: rgba(30,30,30,0.8); padding: 10px; border-radius: 8px; z-index: 999; font-size: 12px; display: flex; flex-direction: column; gap: 5px;">
        <div style="color: #00ffcc; font-weight: bold; margin-bottom: 5px;">[DEBUG] Simulador de Câmera/STT</div>
        <button onclick="debugSetState({status: 'unknown_detected'})">1. Detectar Desconhecido</button>
        <button onclick="debugSetState({status: 'onboarding_confirm_name', options: ['Vitor', 'Senhor Vitor', 'Mestre Vitor', 'Lorde Vitor']})">2. Simular STT "Vitor"</button>
        <button onclick="debugSetState({status: 'known_detected', name: 'Vitor'})">3. Detectar Conhecido (Vitor)</button>
        <button onclick="debugSetState({status: 'standby'})">4. Voltar para Standby (Espelho Limpo)</button>
    </div>

    <!-- Overlay removido a pedido do usuário, a UI agora é discreta no bottom-left -->

    <div class="mirror-container">
        <!-- Topo Esquerdo: Vazio -->
        <div class="top-left">
        </div>

        <!-- Topo Centro: Notificações -->
        <div class="top-center">
            <!-- Reservado para Notificações -->
        </div>

        <!-- Topo Direito: Relógio, Data, Clima e Notícias -->
        <div class="top-right">
            <div class="time-widget" id="timeDisplay">00:00</div>
            <div class="date-widget" id="dateDisplay">Carregando data...</div>
            
            <!-- Widget de Clima do RJ -->
            <div class="weather-widget">
                <span id="weatherTemp">--°C</span>
                <div class="weather-desc" id="weatherDesc">Carregando clima...</div>
            </div>

            <!-- Widget de Notícias (Manchetes) -->
            <div id="newsDisplay" class="news-widget">
                Carregando notícias...
            </div>
            
            <!-- Widget de Notícia Completa (Escondido) -->
            <div id="newsDetailDisplay" class="news-widget" style="display: none;">
                <div class="news-detail-content" id="newsDetailText"></div>
                <div class="back-btn" onclick="hideNewsDetail()">⬅ Voltar para as manchetes</div>
            </div>
        </div>

        <!-- Meio: Saudação Principal da Inteligência Artificial -->
        <div class="middle-center">
            <!-- Saudação removida para dar um aspecto mais limpo -->
        </div>

        <!-- Base Esquerda: Status da Câmera -->
        <div class="bottom-left">
            
            <!-- Painel Discreto de Onboarding (Usando absolute para não quebrar o grid) -->
            <div id="onboardingPanel" style="display: none; position: absolute; bottom: 45px; left: 0; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); width: 260px; backdrop-filter: blur(5px); z-index: 50;">
                
                <!-- ESTADO 1: Escutando nome -->
                <div id="stateListening" style="display: none;">
                    <div style="font-size: 1.1rem; color: #fff; margin-bottom: 10px;">👤 Rosto Desconhecido</div>
                    <div style="font-size: 0.9rem; color: #aaa; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
                        Diga o seu nome... 
                        <span class="mic-pulse" style="font-size: 1.2rem;">🎤</span>
                    </div>
                    
                    <!-- Espaço para futura foto da câmera -->
                    <div style="width: 100%; height: 90px; background: #111; border-radius: 6px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; color: #555; font-size: 0.8rem; border: 1px dashed #333;">
                        [ Câmera Feed ]
                    </div>
                    
                    <button class="btn-discreet" onclick="retryRecognition()">🔄 Tentar novamente</button>
                </div>

                <!-- ESTADO 2: Confirmar tratamento -->
                <div id="stateConfirm" style="display: none;">
                    <div style="font-size: 1.1rem; color: #fff; margin-bottom: 15px;">Como prefere ser chamado?</div>
                    <div id="nameOptions" style="display: flex; flex-direction: column; gap: 8px; max-height: 150px; overflow-y: auto;">
                        <!-- Botões gerados via JS -->
                    </div>
                </div>
            </div>

            <!-- Container do Usuário Logado -->
            <div id="userLoggedContainer" style="display: none; position: absolute; bottom: 35px; left: 0; z-index: 50;">
                <!-- Pílula Premium -->
                <div style="background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); display: flex; align-items: center; gap: 12px;">
                    <!-- Avatar genérico (no futuro puxa a foto do FaceData) -->
                    <div style="width: 40px; height: 40px; border-radius: 50%; background: #333; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </div>
                    <div>
                        <div style="font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px;">Sessão Ativa</div>
                        <div id="loggedUserName" style="font-size: 1.1rem; color: #fff; font-weight: bold;">Nome</div>
                    </div>
                </div>
                <!-- Botão Sair Discreto -->
                <div style="text-align: center; margin-top: 6px;">
                    <span style="font-size: 0.7rem; color: #555; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s;" onclick="manualLogout()" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#555'">Sair</span>
                </div>
            </div>

            <div class="status-badge" id="cameraStatus">Câmera em Standby</div>
        </div>

        <!-- Base Centro: Vazio -->
        <div class="bottom-center">
        </div>
    </div>

    <!-- Scripts do Frontend -->
    <script>
        // Função para manter o relógio sempre atualizado
        function updateTime() {
            const now = new Date();
            
            // Formata e Atualiza a Hora (ex: 14:30)
            const timeOptions = { hour: '2-digit', minute: '2-digit', hour12: false };
            document.getElementById('timeDisplay').textContent = now.toLocaleTimeString('pt-BR', timeOptions);
            
            // Formata e Atualiza a Data (ex: Sexta-feira, 28 de Abril)
            const dateOptions = { weekday: 'long', day: 'numeric', month: 'long' };
            let dateString = now.toLocaleDateString('pt-BR', dateOptions);
            // Garante que a primeira letra seja maiúscula para ficar bonito
            dateString = dateString.charAt(0).toUpperCase() + dateString.slice(1);
            
            document.getElementById('dateDisplay').textContent = dateString;
        }

        // Roda a função uma vez agora, e depois a cada 1 segundo (1000ms)
        updateTime();
        setInterval(updateTime, 1000);

        // Variável global para armazenar as notícias e permitir o clique
        let globalNewsData = [];

        // --- Comunicação com a NOSSA API em Python (Django) ---
        async function fetchWidgetsData() {
            try {
                const response = await fetch('/api/data/');
                const data = await response.json();
                
                // --- 1. Atualiza o Clima ---
                document.getElementById('weatherTemp').textContent = data.weather.temperature + "°C";
                document.getElementById('weatherDesc').textContent = data.weather.city + " • " + data.weather.description;

                // --- 2. Atualiza as Notícias ---
                const newsContainer = document.getElementById('newsDisplay');
                if (data.news && data.news.length > 0) {
                    globalNewsData = data.news;
                    let htmlNews = "";
                    data.news.forEach((newsObj, index) => {
                        htmlNews += `<div class="news-item" onclick="showNewsDetail(${index})">${newsObj.title}</div>`;
                    });
                    newsContainer.innerHTML = htmlNews;
                } else {
                    newsContainer.innerHTML = "Nenhuma notícia no momento.";
                }
                
            } catch (error) {
                console.error("Erro ao comunicar com o servidor Django: ", error);
                document.getElementById('weatherDesc').textContent = "Servidor Offline";
            }
        }

        // --- Funções de Interação (Clique na Notícia) ---
        function showNewsDetail(index) {
            const newsObj = globalNewsData[index];
            
            // Esconde as manchetes e mostra os detalhes
            document.getElementById('newsDisplay').style.display = 'none';
            document.getElementById('newsDetailDisplay').style.display = 'block';
            
            // Preenche o texto com título em negrito + descrição
            document.getElementById('newsDetailText').innerHTML = `
                <strong style="color: white; font-size: 1.2rem; display: block; margin-bottom: 10px; text-align: right;">${newsObj.title}</strong>
                <span style="color: #cccccc;">${newsObj.description}</span>
            `;
        }

        function hideNewsDetail() {
            // Volta a mostrar as manchetes e esconde a notícia completa
            document.getElementById('newsDetailDisplay').style.display = 'none';
            document.getElementById('newsDisplay').style.display = 'block';
        }

        // Variáveis para gerenciar o "Falso Negativo" (ocultamento temporário do rosto)
        let logoutGraceTimer = null;
        let currentScreenStatus = "standby";

        // --- Cérebro Principal (Polling de Estado do Espelho) ---
        async function checkMirrorStatus() {
            try {
                // Bate na API a cada 2 segundos
                const response = await fetch('/api/status/');
                const state = await response.json();
                
                // Se o backend pedir standby, mas a tela estava logada (o usuário "sumiu" da câmera agora)
                if (state.status === "standby" && currentScreenStatus === "known_detected" && !state.force_logout) {
                    if (!logoutGraceTimer) {
                        // Inicia o cronômetro de 10 segundos de tolerância (Grace Period)
                        logoutGraceTimer = setTimeout(() => {
                            currentScreenStatus = "standby";
                            updateScreenUI(state);
                            logoutGraceTimer = null;
                        }, 10000); 
                    }
                    // Ignora a atualização da UI enquanto o tempo não estourar (mantém logado na tela)
                    return; 
                }
                
                // Se a câmera viu alguém de novo (ou estado mudou), cancela o cronômetro de logout
                if (state.status !== "standby" || state.force_logout) {
                    if (logoutGraceTimer) {
                        clearTimeout(logoutGraceTimer);
                        logoutGraceTimer = null;
                    }
                    currentScreenStatus = state.status;
                    updateScreenUI(state);
                    return;
                }
                
                // Se já estava standby e continua standby, só atualiza UI caso necessário
                if (state.status === "standby" && currentScreenStatus === "standby") {
                    updateScreenUI(state);
                }
                
            } catch (error) {
                console.error("Erro ao checar status do cérebro:", error);
            }
        }

        // --- Atualização Visual da Tela ---
        function updateScreenUI(state) {
            const panel = document.getElementById('onboardingPanel');
            const loggedPanel = document.getElementById('userLoggedContainer');
            const listening = document.getElementById('stateListening');
            const confirm = document.getElementById('stateConfirm');
            const badge = document.getElementById('cameraStatus');
            
            // 1. Standby ou Conhecido
            if (state.status === "standby" || state.status === "known_detected") {
                panel.style.display = 'none';
                if (state.status === "known_detected") {
                    loggedPanel.style.display = 'block';
                    document.getElementById('loggedUserName').textContent = state.name;
                    badge.style.display = 'none'; // Esconde a badge de standby
                } else {
                    loggedPanel.style.display = 'none';
                    badge.style.display = 'inline-block';
                    badge.textContent = "Câmera em Standby";
                    badge.style.color = "#aaaaaa";
                }
            } 
            // 2. Desconhecido (Liga o microfone do Onboarding)
            else if (state.status === "unknown_detected") {
                loggedPanel.style.display = 'none';
                badge.style.display = 'inline-block';
                badge.textContent = "Reconhecendo...";
                badge.style.color = "#00ffcc";
                panel.style.display = 'block';
                listening.style.display = 'block';
                confirm.style.display = 'none';
            }
            // 3. Confirmando o nome
            else if (state.status === "onboarding_confirm_name") {
                loggedPanel.style.display = 'none';
                panel.style.display = 'block';
                listening.style.display = 'none';
                confirm.style.display = 'block';
                
                let htmlOpts = "";
                if(state.options) {
                    state.options.forEach(opt => {
                        htmlOpts += `<button class="btn-option" onclick="selectName('${opt}')">${opt}</button>`;
                    });
                }
                document.getElementById('nameOptions').innerHTML = htmlOpts;
            }
        }

        // --- Ações dos Botões (E do Painel de Debug) ---
        async function debugSetState(stateObj) {
            await fetch('/api/debug/set_state/', {
                method: 'POST',
                body: JSON.stringify(stateObj)
            });
            checkMirrorStatus(); // atualiza a UI imediatamente
        }

        async function manualLogout() {
            // Força o logout na hora, sem a tolerância de 10 segundos
            await fetch('/api/debug/set_state/', {
                method: 'POST',
                body: JSON.stringify({status: 'standby', force_logout: true})
            });
            checkMirrorStatus();
        }

        async function retryRecognition() {
            // Falso negativo: Volta pro standby para a câmera reiniciar a tentativa de leitura
            await fetch('/api/debug/set_state/', {
                method: 'POST',
                body: JSON.stringify({status: 'standby'})
            });
            checkMirrorStatus();
        }

        async function selectName(name) {
            // Em um app real, chamaria a API do users para criar o Profile.
            // Por enquanto, simulamos que cadastrou e reconheceu!
            await fetch('/api/debug/set_state/', {
                method: 'POST',
                body: JSON.stringify({status: 'known_detected', name: name})
            });
            checkMirrorStatus();
            // Remoção do alert nativo, o espelho apenas volta ao estado de boas vindas
        }

        // Chama imediatamente e depois atualiza a cada 5 minutos
        fetchWidgetsData();
        setInterval(fetchWidgetsData, 5 * 60 * 1000);
        
        // Polling do cérebro a cada 2 segundos
        checkMirrorStatus();
        setInterval(checkMirrorStatus, 2000);
    </script>
</body>
</html>
